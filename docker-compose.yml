# ============================================================
# docker-compose.yml — Automated Visual Data Processing System
#
# Profiles:
#   default (cpu):  CPU-only inference
#   gpu:            Enables NVIDIA GPU acceleration
#
# Usage:
#   docker-compose up                  # CPU mode
#   docker-compose --profile gpu up    # GPU mode
#   docker-compose up --build          # rebuild image
# ============================================================

version: "3.9"

services:

  # ── Defect Detection API + Dashboard ─────────────────────
  defect-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: defect-detection:latest
    container_name: defect_api
    ports:
      - "8000:8000"        # API + Dashboard
    volumes:
      # Mount model checkpoint so you can update it without rebuilding
      - ./checkpoints:/app/checkpoints:ro
      # Mount logs directory for output persistence
      - ./logs:/app/logs
    environment:
      - CONFIG_PATH=/app/configs/config.yaml
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── GPU variant (nvidia-docker required) ─────────────────
  defect-api-gpu:
    extends:
      service: defect-api
    profiles:
      - gpu
    container_name: defect_api_gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - CONFIG_PATH=/app/configs/config.yaml
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
