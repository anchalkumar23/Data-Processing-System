# ============================================================
# .github/workflows/ci.yml
# CI/CD Pipeline — Automated Visual Data Processing System
#
# Triggers on every push and pull request to main/develop.
# Runs:
#   1. Code quality checks (black, isort, flake8)
#   2. Unit and integration tests (pytest)
#   3. Docker image build validation
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: defect-detection

jobs:

  # ── Job 1: Code Quality ────────────────────────────────────
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install black==24.4.2 isort==5.13.2 flake8==7.0.0

      - name: Check formatting (black)
        run: black --check --diff .

      - name: Check import ordering (isort)
        run: isort --check-only --diff .

      - name: Check style (flake8)
        run: |
          flake8 . \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --exclude=.git,__pycache__,.venv

  # ── Job 2: Tests ───────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies (for OpenCV)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libsm6 libxext6 libxrender-dev libgomp1

      - name: Install Python dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Job 3: Docker Build ────────────────────────────────────
  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false                   # don't push to registry on every commit
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha          # use GitHub Actions cache for faster builds
          cache-to: type=gha,mode=max

      - name: Verify image was built
        run: docker image inspect ${{ env.IMAGE_NAME }}:${{ github.sha }}
